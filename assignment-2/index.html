<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Pizza Builder</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link href="css/normalize.css" rel="stylesheet" />
	<link href="css/styles.css" rel="stylesheet" />
	<script src="js/pizza.js" defer></script>
</head>

<body>
    <header>
        <h1>Pizza Builder 3000</h1>
        <p id="studentInfo"></p>
    </header>
    <main>
        <form>
            <div class="radios">
            <fieldset>
                <legend>Select a Size</legend>
                <!--
                Pizza Sizes
                    - small
                    - medium
                    - large
                -->
                <div class="menu">
                    <span>
                    <input type="radio" id="smallSize" name="size" value="small" required checked>
                    <label for="smallSize">small</label>
                    </span>
                    <span>
                    <input type="radio" id="mediumSize" name="size" value="medium">
                    <label for="mediumSize">medium</label>
                    </span>
                    <span>
                    <input type="radio" id="largeSize" name="size" value="large">
                    <label for="largeSize">large</label>
                    </span>
                </div>
            </fieldset>
            <fieldset>
                <!--
                Pizza Crusts
                    - thin
                    - regular
                    - stuffed
                -->
                <legend>Select Your Crust</legend>
                <div class="menu">
                    <span>
                    <input type="radio" id="regularCrust" name="crust" value="regular" required checked>
                    <label for="regularCrust">regular</label>
                    </span>
                    <span>
                    <input type="radio" id="thinCrust" name="crust" value="thin">
                    <label for="thinCrust">thin</label>
                    </span>
                    <span>
                    <input type="radio" id="stuffedCrust" name="crust" value="stuffed">
                    <label for="stuffedCrust">stuffed</label>
                    </span>
                </div>
            </fieldset>
            <fieldset>
                <legend>Select Your Sauce</legend>
                <!--
                sauce type
                    - tomato
                    - alfredo
                    - bbq
                    - no
                -->
                <div class="menu">
                    <span>
                    <input type="radio" id="tomatoSauce" name="sauce" value="tomato" required checked>
                    <label for="tomatoSauce">tomato</label>
                    </span>
                    <span>
                    <input type="radio" id="alfredoSauce" name="sauce" value="alfredo">
                    <label for="alfredoSauce">alfredo</label>
                    </span>
                    <span>
                    <input type="radio" id="bbqSauce" name="sauce" value="bbq">
                    <label for="bbqSauce">bbq</label>
                    </span>
                    <span>
                    <input type="radio" id="noSauce" name="sauce" value="no">
                    <label for="noSauce">none</label>
                    </span>
                </div>
            </fieldset>
            <fieldset>
                <!--
                cheese type
                    - mozzarella
                    - cheddar
                    - parmesan
                    - no
                -->
                <legend>Select Your Cheese</legend>
                <div class="menu">
                    <span>
                    <input type="radio" id="mozzarellaCheese" name="cheese" value="mozzarella" required checked>
                    <label for="mozzarellaCheese">mozzarella</label>
                    </span>
                    <span>
                    <input type="radio" id="cheddarCheese" name="cheese" value="cheddar">
                    <label for="cheddarCheese">cheddar</label>
                    </span>
                    <span>
                    <input type="radio" id="parmesanCheese" name="cheese" value="parmesan">
                    <label for="parmesanCheese">parmesan</label>
                    </span>
                    <span>
                    <input type="radio" id="noCheese" name="cheese" value="no">
                    <label for="noCheese">none</label>
                    </span>
                </div>
            </fieldset>
            </div>
            <div class="checkboxes">
            <fieldset>
                <legend>Select Your Toppings</legend>
                <!--
                vegetable toppings
                    - mushrooms
                    - peppers
                    - tomatoes
                    - onions
                -->
                
                    <div class="menu">
                        <h3>Vegetable Toppings</h3>
                        <span>
                        <input type="checkbox" id="mushrooms" name="toppings" value="mushrooms">
                        <label for="mushrooms">mushrooms</label>
                        </span>
                        <span>
                        <input type="checkbox" id="peppers" name="toppings" value="peppers">
                        <label for="peppers">peppers</label>
                        </span>
                        <span>
                        <input type="checkbox" id="tomatoes" name="toppings" value="tomatoes">
                        <label for="tomatoes">tomatoes</label>
                        </span>
                        <span>
                        <input type="checkbox" id="onions" name="toppings" value="onions">
                        <label for="onions">onions</label>
                        </span>
                    </div>
                    <!--
                    meat toppings
                        - pepperoni
                        - bacon
                        - sausage
                        - chicken
                    -->
                    <div class="menu">
                        <h3>Meat Toppings</h3>
                        <span>
                        <input type="checkbox" id="pepperoni" name="toppings" value="pepperoni">
                        <label for="pepperoni">pepperoni</label>
                        </span>
                        <span>
                        <input type="checkbox" id="bacon" name="toppings" value="bacon">
                        <label for="bacon">bacon</label>
                        </span>
                        <span>
                        <input type="checkbox" id="sausage" name="toppings" value="sausage">
                        <label for="sausage">sausage</label>
                        </span>
                        <span>
                        <input type="checkbox" id="chicken" name="toppings" value="chicken">
                        <label for="chicken">chicken</label>
                        </span>
                    </div>
                
            </fieldset>
            <div class="buttons">
                <button type="submit" id="order">Order</button>
                <button type="reset" id="reset">Clear Selection</button>
            </div>
            </div>
        </form>
        <div id="orderSummary">
            <h2>Pizza Order Summary</h2>
            <ul id="pizzas">
            </ul>
        </div>
    </main>
    <footer>
        <small>Copyright me, all rights reserved, something something legalese</small>
    </footer>
</body>
</html>

    Be creative – what different options might you want your customers to have?
    Validate the HTML pizza order form. The following steps should only execute if all validations pass.

    Write JavaScript to capture the values from each of the form inputs when the user clicks the 'order' button.

    When the form is submitted and validated, instantiate a new Pizza object from your class using the captured form values. Visually output the pizza description to the HTML page by invoking the method on your Pizza object — the displayed text must come from that method, not directly from the form values.
